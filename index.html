<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>软件测试笔记</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-light: #3b82f6;
      --primary-dark: #1d4ed8;
      --accent: #8b5cf6;
      --success: #10b981;
      --sidebar-bg: #0f172a;
      --bg: #f8fafc;
      --bg-white: #ffffff;
      --text: #334155;
      --text-light: #64748b;
      --text-dark: #1e293b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.08), 0 4px 6px -4px rgba(0,0,0,.04);
      --transition: .25s cubic-bezier(.4,0,.2,1);
    }

    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      max-width: 720px;
      width: 100%;
      text-align: center;
    }

    .hero {
      margin-bottom: 3rem;
    }

    .hero-icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
    }

    .hero h1 {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: .5rem;
      letter-spacing: -.02em;
    }

    .hero .subtitle {
      font-size: 1.1rem;
      color: var(--text-light);
      font-weight: 400;
    }

    .chapters {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .chapter-card {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.8rem 2rem;
      text-decoration: none;
      color: inherit;
      box-shadow: var(--shadow);
      transition: var(--transition);
      text-align: left;
    }

    .chapter-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary-light);
    }

    .chapter-card .ch-icon {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .chapter-card .ch-icon.blue { background: #dbeafe; }
    .chapter-card .ch-icon.purple { background: #ede9fe; }

    .chapter-card .ch-body {
      flex: 1;
    }

    .chapter-card .ch-body h2 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: .25rem;
    }

    .chapter-card .ch-body .ch-en {
      font-size: .85rem;
      color: var(--text-light);
      margin-bottom: .4rem;
    }

    .chapter-card .ch-body p {
      font-size: .92rem;
      color: var(--text);
      line-height: 1.6;
    }

    .chapter-card .ch-arrow {
      flex-shrink: 0;
      font-size: 1.2rem;
      color: var(--text-light);
      transition: var(--transition);
    }

    .chapter-card:hover .ch-arrow {
      color: var(--primary);
      transform: translateX(4px);
    }

    .footer {
      color: var(--text-light);
      font-size: .82rem;
      margin-top: 1rem;
    }

    @media (max-width: 600px) {
      body { padding: 1.2rem; }
      .hero h1 { font-size: 1.8rem; }
      .chapter-card { padding: 1.2rem; gap: 1rem; }
      .chapter-card .ch-icon { width: 48px; height: 48px; font-size: 1.4rem; border-radius: 12px; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="hero">
    <div class="hero-icon">📘</div>
    <h1>软件测试笔记</h1>
    <div class="subtitle">Software Testing Notes — 软件工程课程学习笔记</div>
  </div>

  <div class="chapters">
    <a href="site-ch4/index.html" class="chapter-card">
      <div class="ch-icon blue">🧪</div>
      <div class="ch-body">
        <h2>Chapter 4 · 逻辑覆盖</h2>
        <div class="ch-en">Logic Coverage</div>
        <p>谓词与子句的覆盖标准体系，包括 PC、CC、CoC、ACC 家族、ICC 家族，以及 DNF 语法覆盖和 FSM 逻辑覆盖。</p>
      </div>
      <div class="ch-arrow">→</div>
    </a>

    <a href="site-ch5/index.html" class="chapter-card">
      <div class="ch-icon purple">🧬</div>
      <div class="ch-body">
        <h2>Chapter 5 · 基于语法的测试</h2>
        <div class="ch-en">Syntax-based Testing</div>
        <p>利用 BNF 文法和程序语法结构生成测试用例，涵盖文法覆盖标准、变异测试基础、RIPR 模型与变异运算符。</p>
      </div>
      <div class="ch-arrow">→</div>
    </a>
  </div>

  <div class="footer">
    Software Testing · HW5
  </div>
</div>

</body>
</html>
